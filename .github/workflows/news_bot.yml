name: 뉴스봇

on:
  schedule:
    - cron: '0 21 * * *'   # KST 06:00
    - cron: '0 7 * * *'    # KST 16:00
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: 패키지 설치
        run: pip install -r requirements.txt
      - name: 뉴스봇 실행
        run: python news_bot.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
